name: Agent Quality Evals

# Run only when files that affect agent behavior or test infrastructure change.
# Doc-only commits (README, .gitignore, notebook narration, etc.) skip CI to
# avoid wasting evaluator API credits on changes that can't break the gate.
on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'evals/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements.txt'
      - '.github/workflows/evals.yml'
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'evals/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'requirements.txt'
      - '.github/workflows/evals.yml'

jobs:
  evals:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.11
      - name: Install deps
        run: uv sync --frozen
      - name: Run agent evals (regression gates via asserts; capability tracks)
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LANGSMITH_API_KEY: ${{ secrets.LANGSMITH_API_KEY }}
          LANGSMITH_TRACING: "true"
          LANGSMITH_PROJECT: "agent-eval-workshop-ci"
        run: |
          uv run pytest tests/ --langsmith-output -v
